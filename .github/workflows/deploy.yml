name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Static Site to Hetzner
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Nginx configs to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/sites-available/*.conf,nginx/snippets/*.conf"
          target: "/tmp/landing-page-deploy"
          strip_components: 0

      - name: Generate cache-busted assets
        run: |
          HASH=$(echo "${{ github.sha }}" | cut -c1-8)
          # Create hashed copies of CSS and JS (originals stay untouched in repo)
          cp css/style.css "css/style.${HASH}.css"
          cp js/main.js "js/main.${HASH}.js"
          cp js/i18n.js "js/i18n.${HASH}.js"
          # Replace asset references in all HTML pages
          for f in index.html impressum.html datenschutz.html; do
            if [[ -f "$f" ]]; then
              sed -i "s|/css/style\.css|/css/style.${HASH}.css|g" "$f"
              sed -i "s|/js/main\.js|/js/main.${HASH}.js|g" "$f"
              sed -i "s|/js/i18n\.js|/js/i18n.${HASH}.js|g" "$f"
            fi
          done
          # Stamp the deploy hash into the service worker cache name
          sed -i "s|CACHE_NAME = 'festas-__DEPLOY_HASH__'|CACHE_NAME = 'festas-${HASH}'|g" sw.js

      - name: Copy static site files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,datenschutz.html,impressum.html,css/,js/,assets/,sw.js,robots.txt,sitemap.xml"
          target: "/tmp/landing-page-deploy/site"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOMAIN
          script_stop: true
          script: |
            set -euo pipefail

            echo "=========================================="
            echo "Deploying landing page for ${DOMAIN:-festas-builds.com}"
            echo "=========================================="

            # ── 1. Install static site files ──────────────────────────
            echo "[1/3] Installing static site files..."
            sudo mkdir -p /srv/landing-page
            sudo rsync -a --delete /tmp/landing-page-deploy/site/ /srv/landing-page/
            sudo chown -R www-data:www-data /srv/landing-page
            echo "✓ Static files deployed to /srv/landing-page"

            # ── 2. Deploy Nginx configs ────────────────────────────────
            echo "[2/3] Deploying Nginx configurations..."

            sudo rm -f /etc/nginx/sites-enabled/default
            sudo rm -f /etc/nginx/sites-available/default
            sudo rm -f /etc/nginx/conf.d/default.conf

            if [[ -d "/tmp/landing-page-deploy/nginx/sites-available" ]]; then
              sudo cp /tmp/landing-page-deploy/nginx/sites-available/*.conf /etc/nginx/sites-available/
              sudo install -d -o root -g root -m 0755 /etc/nginx/snippets
              sudo install -o root -g root -m 0644 /tmp/landing-page-deploy/nginx/snippets/acme-challenge.conf /etc/nginx/snippets/acme-challenge.conf

              ENABLED_COUNT=0
              SKIPPED_COUNT=0
              shopt -s nullglob
              for conf in /etc/nginx/sites-available/festas-builds.com.conf /etc/nginx/sites-available/*.festas-builds.com.conf; do
                [[ -e "$conf" ]] || continue
                confname=$(basename "$conf")
                domain="${confname%.conf}"

                cert_paths=$(grep -E '^[[:space:]]*ssl_certificate[[:space:]]+' "$conf" | awk '{print $2}' | tr -d ';' | sort -u || true)
                if [[ -z "$cert_paths" ]]; then
                  sudo ln -sf "../sites-available/$confname" "/etc/nginx/sites-enabled/$confname"
                  ENABLED_COUNT=$((ENABLED_COUNT + 1))
                  continue
                fi

                missing=0
                while IFS= read -r p; do
                  [[ -n "$p" ]] || continue
                  if ! sudo test -f "$p"; then
                    echo "  ⚠ $domain references missing cert: $p"
                    missing=1
                  fi
                done <<< "$cert_paths"

                if [[ "$missing" -eq 1 ]]; then
                  echo "  ⚠ Skipping $domain — SSL certificate file not found"
                  sudo rm -f "/etc/nginx/sites-enabled/$confname"
                  SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                else
                  sudo ln -sf "../sites-available/$confname" "/etc/nginx/sites-enabled/$confname"
                  ENABLED_COUNT=$((ENABLED_COUNT + 1))
                fi
              done

              echo "✓ Nginx configs deployed ($ENABLED_COUNT enabled, $SKIPPED_COUNT skipped)"
            else
              echo "⚠ No Nginx configs found — skipping"
            fi

            rm -rf /tmp/landing-page-deploy

            # ── 3. Test and reload Nginx ───────────────────────────────
            echo "[3/3] Reloading Nginx..."

            if sudo nginx -t 2>&1; then
              if sudo systemctl reload nginx; then
                echo "✓ Nginx reloaded successfully"
              else
                echo "✗ Nginx reload failed despite successful config test"
                sudo systemctl status nginx --no-pager || true
                sudo journalctl -u nginx --no-pager -n 50 || true
                exit 1
              fi
            else
              echo "⚠ Nginx config invalid — attempting to disable sites with missing SSL certs..."
              shopt -s nullglob
              for conf in /etc/nginx/sites-enabled/*.conf; do
                confname=$(basename "$conf")
                domain="${confname%.conf}"

                cert_paths=$(grep -E '^[[:space:]]*ssl_certificate[[:space:]]+' "$conf" | awk '{print $2}' | tr -d ';' | sort -u || true)
                if [[ -z "$cert_paths" ]]; then
                  continue
                fi

                missing=0
                while IFS= read -r p; do
                  [[ -n "$p" ]] || continue
                  if ! sudo test -f "$p"; then
                    echo "  ⚠ $domain references missing cert: $p"
                    missing=1
                  fi
                done <<< "$cert_paths"

                if [[ "$missing" -eq 1 ]]; then
                  echo "  Disabling $domain (missing SSL cert file)"
                  sudo rm -f "/etc/nginx/sites-enabled/$confname"
                fi
              done
              if sudo nginx -t 2>&1; then
                if sudo systemctl reload nginx; then
                  echo "✓ Nginx reloaded (some sites disabled due to missing SSL certs)"
                else
                  echo "✗ Nginx reload failed after fallback mitigation"
                  sudo systemctl status nginx --no-pager || true
                  sudo journalctl -u nginx --no-pager -n 50 || true
                  exit 1
                fi
              else
                sudo nginx -t || true
                exit 1
              fi
            fi

            echo ""
            echo "=========================================="
            echo "Deployment complete!"
            echo "Site: https://${DOMAIN:-festas-builds.com}"
            echo "=========================================="

      - name: Show deployment failure logs
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Nginx Status ==="
            sudo systemctl status nginx || true
            echo ""
            echo "=== Nginx Config Test ==="
            sudo nginx -t || true
            echo ""
            echo "=== Nginx Error Log ==="
            sudo tail -30 /var/log/nginx/error.log || true
            echo ""
            echo "=== Nginx Journal (latest 80) ==="
            sudo journalctl -u nginx --no-pager -n 80 || true
            echo ""
            echo "=== Landing Page Dir ==="
            ls -la /srv/landing-page/ || true
