name: SSL One-Time Setup

on:
  workflow_dispatch:

jobs:
  ssl-setup:
    name: Setup unified SSL certificate and auto-reload
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Run SSL setup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            sudo apt-get update
            sudo apt-get install -y certbot

            ACME_WEBROOT="/var/www/certbot"
            ACME_SITE_FILE="/etc/nginx/sites-available/certbot-acme-challenge.conf"
            ACME_SITE_LINK="/etc/nginx/sites-enabled/certbot-acme-challenge.conf"

            sudo mkdir -p "${ACME_WEBROOT}"
            cat <<'EOF' | sudo tee "${ACME_SITE_FILE}" >/dev/null
            server {
              listen 80;
              listen [::]:80;
              server_name festas-builds.com admin.festas-builds.com panel.festas-builds.com mc.festas-builds.com mc-map.festas-builds.com mc-stats.festas-builds.com cs.festas-builds.com rigpilot.festas-builds.com immocalc.festas-builds.com fire.festas-builds.com;

              location /.well-known/acme-challenge/ {
                root /var/www/certbot;
                default_type "text/plain";
                try_files $uri =404;
              }

              location / {
                return 404;
              }
            }
            EOF
            sudo ln -sfn "${ACME_SITE_FILE}" "${ACME_SITE_LINK}"
            sudo nginx -t
            sudo systemctl reload nginx

            sudo certbot certonly --webroot -w "${ACME_WEBROOT}" --cert-name festas-builds.com \
              -d festas-builds.com \
              -d admin.festas-builds.com \
              -d panel.festas-builds.com \
              -d mc.festas-builds.com \
              -d mc-map.festas-builds.com \
              -d mc-stats.festas-builds.com \
              -d cs.festas-builds.com \
              -d rigpilot.festas-builds.com \
              -d immocalc.festas-builds.com \
              -d fire.festas-builds.com \
              --non-interactive --agree-tos --register-unsafely-without-email --keep-until-expiring

            sudo mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            cat <<'EOF' | sudo tee /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
            #!/bin/bash
            nginx -t && systemctl reload nginx
            EOF
            sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh

            sudo systemctl enable --now certbot.timer
            sudo certbot renew --dry-run
            sudo systemctl reload nginx
