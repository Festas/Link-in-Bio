name: SSL One-Time Setup

on:
  workflow_dispatch:

jobs:
  ssl-setup:
    name: Setup unified SSL certificate and auto-reload
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy SSL setup script to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "scripts/ssl-setup.sh"
          target: "/tmp/link-in-bio-ssl-setup"
          strip_components: 1

      - name: Run SSL setup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            chmod +x /tmp/link-in-bio-ssl-setup/ssl-setup.sh
            /tmp/link-in-bio-ssl-setup/ssl-setup.sh
