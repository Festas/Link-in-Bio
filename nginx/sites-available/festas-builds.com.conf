# Main domain - static landing page served from /srv/landing-page

server {
    listen 80;
    listen [::]:80;
    server_name festas-builds.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name festas-builds.com;

    ssl_certificate /etc/letsencrypt/live/festas-builds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/festas-builds.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/landing-page;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA-style fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/festas-builds.com.access.log;
    error_log /var/log/nginx/festas-builds.com.error.log;
}
