# Main domain - static landing page served from /srv/landing-page

server {
    listen 80;
    listen [::]:80;
    server_name festas-builds.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name festas-builds.com;

    ssl_certificate /etc/letsencrypt/live/festas-builds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/festas-builds.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/landing-page;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hashed CSS/JS assets (cache-busted by deploy pipeline, e.g. style.a1b2c3d4.css)
    # NOTE: The {8} here matches the 8-char git SHA prefix generated in deploy.yml.
    # If the hash length in the deploy script changes, update this pattern accordingly.
    location ~* \.[a-f0-9]{8}\.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Unhashed CSS/JS fallback — revalidation-based
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        etag on;
    }

    # Static assets (images, fonts) — long cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML pages — always check for updates
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/festas-builds.com.access.log;
    error_log /var/log/nginx/festas-builds.com.error.log;
}
