<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - festas_builds</title>
    
    <script src="{{ vendor.tailwindcss }}?v={{ version }}"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e5e7eb;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 40%, rgba(0, 217, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(168, 85, 247, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 10%, rgba(0, 217, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%   { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1;   transform: scale(1.05); }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: cardIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Avatar */
        .avatar {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 28px rgba(0, 217, 255, 0.25);
        }
        .avatar svg {
            width: 32px;
            height: 32px;
            stroke: white;
            stroke-width: 1.8;
            fill: none;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin: 0 0 0.25rem;
            background: linear-gradient(135deg, #ffffff 30%, #00d9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 2rem;
        }

        /* Form elements */
        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 0.375rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-wrapper svg {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: #6b7280;
            stroke-width: 1.8;
            fill: none;
            pointer-events: none;
            transition: stroke 0.2s;
        }
        .input-wrapper:focus-within svg {
            stroke: #00d9ff;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 0.875rem 0.75rem 2.75rem;
            font-size: 0.9375rem;
            color: #f3f4f6;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #6b7280;
        }
        input:focus {
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.12);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Password toggle */
        .pw-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #6b7280;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: #d1d5db; }
        .pw-toggle svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

        /* Remember me row */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .remember-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8125rem;
            color: #9ca3af;
            user-select: none;
        }
        .remember-label input[type="checkbox"] {
            appearance: none;
            width: 1rem;
            height: 1rem;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.25rem;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }
        .remember-label input[type="checkbox"]:checked {
            background: #00d9ff;
            border-color: #00d9ff;
        }
        .remember-label input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 0.8125rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            box-shadow: 0 4px 16px rgba(0, 217, 255, 0.3);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0, 217, 255, 0.4);
        }
        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-login svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error message */
        .error-msg {
            min-height: 1.5rem;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8125rem;
            color: #f87171;
            transition: opacity 0.2s;
        }
        .error-msg:empty { opacity: 0; }

        /* Shake animation on error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-6px); }
            80%      { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="login-card" id="login-card">
        <!-- Avatar icon -->
        <div class="avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/><path d="M20 21c0-3.3-3.6-6-8-6s-8 2.7-8 6"/></svg>
        </div>

        <h1>Admin Login</h1>
        <p class="subtitle">festas_builds Control Panel</p>

        <form id="login-form" autocomplete="on">
            <div>
                <label for="username">Benutzername</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Benutzername eingeben">
                </div>
            </div>

            <div>
                <label for="password">Passwort</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Passwort eingeben">
                    <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Passwort anzeigen">
                        <svg id="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-label">
                    <input type="checkbox" id="remember-me" name="remember_me">
                    Angemeldet bleiben
                </label>
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Anmelden
            </button>

            <p class="error-msg" id="error-message"></p>
        </form>
    </div>

    <script src="/static/js/login.js?v={{ version }}" type="module"></script>
</body>
</html>
